services:
  app:
    image: portfolio:latest
    environment:
      AWS_REGION: ${AWS_REGION:?set on host}
      AWS_SECRETSMANAGER_SECRET_NAME: ${AWS_SECRETSMANAGER_SECRET_NAME:?set on host}
      AWS_SECRETSMANAGER_SERVICE_NAME: ${AWS_SECRETSMANAGER_SERVICE_NAME:-client_secret}
    command: gunicorn "__init__:create_app()" --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    restart: on-failure

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    restart: on-failure
