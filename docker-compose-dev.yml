secrets:
  client_secret:
    file: ./secrets/client_secret.txt

networks:
  dev:
    name: portfolio_dev

services:
  app:
    image: portfolio:latest
    networks:
      - dev
    secrets:
      - client_secret
    env_file:
      - .env
    environment:
      - CLIENT_SECRET_FILE=/run/secrets/client_secret
      - CALLBACK_URL=https://scaling-computing-machine-g4665jxggqqfppjx-8000.app.github.dev/oauth/callback
    volumes:
      - .:/app
    command: gunicorn "__init__:create_app()" --bind 0.0.0.0:8000 --reload --log-level debug
    ports:
      - "8000:8000"
    restart: on-failure

  nginx:
    image: nginx:latest
    networks:
      - dev
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    restart: on-failure
