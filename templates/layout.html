<!doctype html>
<html lang="en">
    <head>
        {% block head %}
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        {% block styles %}
            <!-- Bootstrap CSS -->
            {{ bootstrap.load_css() }}
        {% endblock %}

        <title>Diandra Davidson</title>
        {% endblock %}
    </head>
    <body>
        <div class="container-md">
            <div class="row">
                <div class="col gy-5">
                    <!-- Placeholder row -->
                </div>
            </div>
            {% block nav %}
            <nav class="navbar navbar-expand-sm navbar-light">
                <div class="col-sm">
                    <a class="navbar-brand" href="#">Diandra Davidson</a>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler" aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <div class="col-sm">
                        <!-- Additional nav items can go here -->
                    </div>
                    <div class="col-sm float-end">
                        <div class="navbar-nav ms-auto float-end gx-5">
                            {% include 'nav.html' %}
                        </div>
                    </div>
                </div>
            </nav>
            {% endblock %}
            {% block content %}
                <!-- Main content goes here -->
            {% endblock %}
        </div>
            
        {% block scripts %}
            <!-- Optional JavaScript -->
            {{ bootstrap.load_js() }}
        {% endblock %}
    </body>
</html>
