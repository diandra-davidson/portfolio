networks:
  dev:
    name: portfolio_dev

services:
  app:
    image: portfolio:latest
    networks:
      - dev
    env_file:
      - .env
    environment:
      AWS_REGION: ${AWS_REGION}
      AWS_SECRETSMANAGER_SECRET_ID: ${AWS_SECRETSMANAGER_SECRET_ID}
      AWS_SECRETSMANAGER_SECRET_KEY: ${AWS_SECRETSMANAGER_SECRET_KEY:-client_secret}
    volumes:
      - .:/app
    command: gunicorn "__init__:create_app()" --bind 0.0.0.0:8000 --reload --log-level debug
    ports:
      - "8000:8000"
    restart: on-failure

  nginx:
    image: nginx:latest
    networks:
      - dev
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    restart: on-failure
