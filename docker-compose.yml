services:
  app:
    build:
      context: .
    image: portfolio:latest
    env_file:
      - .env
    environment:
      AWS_SDK_LOAD_CONFIG: "1"
      AUTHORIZATION_URL: ${AUTHORIZATION_URL:?set on host}
      AWS_SECRETSMANAGER_REGION: ${AWS_SECRETSMANAGER_REGION:?set on host}
      AWS_SECRETSMANAGER_SECRET_NAME: ${AWS_SECRETSMANAGER_SECRET_NAME:?set on host}
      AWS_SECRETSMANAGER_SERVICE_NAME: ${AWS_SECRETSMANAGER_SERVICE_NAME:?set on host}
      AWS_SECRETSMANAGER_FLASK_REGION: ${AWS_SECRETSMANAGER_FLASK_REGION:?set on host}
      AWS_SECRETSMANAGER_FLASK_SECRET_NAME: ${AWS_SECRETSMANAGER_FLASK_SECRET_NAME:?set on host}
      AWS_SECRETSMANAGER_FLASK_SERVICE_NAME: ${AWS_SECRETSMANAGER_FLASK_SERVICE_NAME:?set on host}
      CALLBACK_URL: ${CALLBACK_URL:?set on host}
      CLIENT_ID: ${CLIENT_ID:?set on host}
      SCOPE: ${SCOPE:-read:user user:email}
      TOKEN_URL: ${TOKEN_URL:?set on host}
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    command: gunicorn "__init__:create_app()" --bind 0.0.0.0:8000
    ports:
      - "127.0.0.1:8000:8000"
    restart: on-failure
